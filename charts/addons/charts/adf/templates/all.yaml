{{/*
ADF — Deployment + PVC + Service + Ingress in one file. The chart is
small enough that splitting these into separate template files.master just
adds noise.
*/}}
{{- if .Values.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "adf.fullname" . }}-data
  labels: {{- include "adf.labels" . | nindent 4 }}
spec:
  accessModes: [{{ .Values.persistence.accessMode | quote }}]
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
---
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "adf.fullname" . }}
  labels: {{- include "adf.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
  selector: {{- include "adf.selectorLabels" . | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "adf.fullname" . }}
  labels: {{- include "adf.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy: {type: Recreate}
  selector:
    matchLabels: {{- include "adf.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "adf.labels" . | nindent 8 }}
    spec:
      containers:
        - name: adf
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            # OIDC issuer-match: must equal the public Keycloak URL.
            - name: KEYCLOAK_URL
              value: {{ required "keycloak.url must be set" .Values.keycloak.url | quote }}
            - name: KEYCLOAK_REALM
              value: {{ .Values.keycloak.realm | quote }}
            - name: POOLPARTY_URL
              value: {{ .Values.poolparty.internalUrl | quote }}
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_PPT_CLIENTSECRET
              value: {{ .Values.keycloak.clientSecret | quote }}
            - name: MANAGEMENT_ENDPOINTS_WEB_CORS_ALLOWED_ORIGINS
              value: {{ .Values.externalUrl | quote }}
          ports:
            - name: http
              containerPort: 8080
          resources: {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/adf
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "adf.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "adf.fullname" . }}
  labels: {{- include "adf.labels" . | nindent 4 }}
  annotations:
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts: [{{ include "adf.host" . | quote }}]
      secretName: wildcard-tls
  rules:
    - host: {{ include "adf.host" . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "adf.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
