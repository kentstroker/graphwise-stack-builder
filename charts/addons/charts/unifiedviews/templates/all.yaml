{{- if .Values.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "uv.fullname" . }}-data
  labels: {{- include "uv.labels" . | nindent 4 }}
spec:
  accessModes: [{{ .Values.persistence.accessMode | quote }}]
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
---
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "uv.fullname" . }}
  labels: {{- include "uv.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
  selector: {{- include "uv.selectorLabels" . | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "uv.fullname" . }}
  labels: {{- include "uv.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy: {type: Recreate}
  selector:
    matchLabels: {{- include "uv.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "uv.labels" . | nindent 8 }}
    spec:
      # Mounting the PVC at /unified-views shadows the image's
      # /unified-views/{run-uv.sh,configs,dependencies,uv-backend}.
      # On a fresh PVC the main container starts with an empty
      # /unified-views and the entrypoint immediately fails:
      #   "/__cacert_entrypoint.sh: line 114:
      #    /unified-views/run-uv.sh: No such file or directory"
      #
      # This initContainer runs the SAME image, copies its
      # /unified-views/ tree into the PVC (`cp -an` = no-clobber, so
      # subsequent restarts and image upgrades only ADD new files.master
      # without trampling runtime data the app may have written).
      # By the time the main container starts, the PVC carries the
      # image's binaries plus room for whatever state the app
      # persists.
      initContainers:
        - name: populate-image-content
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Populating PVC from image's /unified-views/..."
              cp -an /unified-views/. /target/
              echo "PVC contents now:"
              ls -la /target/
          volumeMounts:
            - name: data
              mountPath: /target

        # UnifiedViews' Tomcat /master context calls
        # http://rdf4j:8080/rdf4j-server during startup to bootstrap the
        # `uv` repository. If RDF4J isn't accepting connections yet, UV
        # gets a single `Connection refused` -- Tomcat marks the context
        # FAILED, but the JVM keeps running with port 8080 listening
        # (Tomcat itself is healthy). The pod stays Running 1/1, the
        # readiness probe passes, but UV is permanently dead: the `uv`
        # repository is never created, every login path is broken, and
        # the umbrella's uv-password-reset Job deadlocks waiting for
        # the repo to appear.
        #
        # Resolved on a fresh deploy by `kubectl rollout restart` (UV
        # bootstrap succeeds the second time once rdf4j is up), but
        # that's a manual recovery -- this initContainer makes it
        # impossible by holding the main container off until rdf4j
        # answers /rdf4j-server/protocol. 5-second poll x 60 attempts
        # = 5-minute cap; RDF4J typically warms up in ~30s on a fresh
        # KIND cluster.
        - name: wait-for-rdf4j
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              echo "Waiting for rdf4j at http://rdf4j:8080/rdf4j-server/protocol ..."
              for i in $(seq 1 60); do
                  if wget -q -O- "http://rdf4j:8080/rdf4j-server/protocol" >/dev/null 2>&1; then
                      echo "  rdf4j up after $i attempt(s)"
                      exit 0
                  fi
                  sleep 5
              done
              echo "ERROR: rdf4j never answered (5min). UV cannot bootstrap." >&2
              exit 1
      containers:
        - name: unifiedviews
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # UnifiedViews has its own login (default admin/admin) — no
          # Keycloak. Has its own license file at LICENSE_DIR.
          env:
            - name: LICENSE_DIR
              value: /unified-views/license/
          ports:
            - name: http
              containerPort: 8080
          resources: {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /unified-views
            - name: license
              mountPath: /unified-views/license/uv-license.key
              subPath: {{ .Values.license.secretKey }}
              readOnly: true
      volumes:
        - name: license
          secret:
            secretName: {{ .Values.license.secretName }}
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "uv.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "uv.fullname" . }}
  labels: {{- include "uv.labels" . | nindent 4 }}
  annotations:
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts: [{{ include "uv.host" . | quote }}]
      secretName: wildcard-tls
  rules:
    - host: {{ include "uv.host" . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "uv.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
