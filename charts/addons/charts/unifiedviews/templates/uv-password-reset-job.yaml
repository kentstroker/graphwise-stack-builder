{{- if .Values.passwordReset.enabled }}
{{/*
Helm post-install/upgrade hook that idempotently SPARQL-resets the
UnifiedViews login passwords (admin/admin, user/user by default) by
DELETE+INSERTing the password triple in the conf graph of the
RDF4J `uv` repository.

Why this exists:
  UV's image bootstraps the admin + user accounts on first boot but
  the password triple it lays down doesn't decode against any known
  default — the literal `admin / admin` printed in UV docs does NOT
  log you in on a clean deploy. Without intervention, every fresh
  install lands in a state where the operator gets "Invalid
  credentials" with no documented way to recover (UV has no built-in
  password reset). On a broken first deploy the recovery dance was:
    1. exec into the rdf4j workbench
    2. find the conf graph + user resource URI
    3. python3 hashlib.pbkdf2_hmac("sha1", b"admin", salt, 100000, 32)
    4. format as "100000:salt-hex:dk-hex"
    5. DELETE old + INSERT new in the right named graph (NOT default
       graph -- UV reads from <.../resource/graph/conf>)
  This Job replaces that. Runs on every install + upgrade and
  guarantees admin/admin + user/user are usable.

How it works:
  - Talks to rdf4j Service IN-CLUSTER at http://rdf4j:8080/... so it
    bypasses the nginx ingress + basic-auth (rdf4j-workbench has no
    container-level auth; auth is enforced only at the ingress).
  - Waits for the uv repository to exist (UV creates it on first
    boot) AND for UV's seed admin user triple to be present (so we
    KNOW UV has finished bootstrapping the user resource and we're
    only swapping the password, not orphaning it).
  - PBKDF2-HMAC-SHA1, 100k iter, 32-byte salt, 32-byte derived key,
    format `iter:salt-hex:dk-hex` -- this is the EXACT format UV's
    PasswordHash class parses. SHA-1 is non-obvious -- UV docs
    suggest SHA-256 in places but the running PasswordHash uses
    SHA-1; do not change without re-confirming against UV source.
  - SPARQL UPDATE: DELETE matching ?old + INSERT new hash, both
    scoped to the conf named graph. UPDATE is one HTTP POST with
    `--data-urlencode "update=..."` (form-encoded; do NOT switch to
    application/sparql-update content-type, that path 415s for the
    rdf4j 5.x workbench).
  - Idempotent: re-running deletes the prior hash and writes a fresh
    one. Safe to re-run any number of times.

Hook semantics:
  - post-install,post-upgrade: runs every install/upgrade.
  - hook-weight: 15 (after Keycloak bootstrap=5,
    graphrag-realm-patch=8, graphrag-vectors-index=10).
  - hook-delete-policy: before-hook-creation,hook-succeeded.

Lives in the umbrella's release namespace (graphwise) because
that's where both the `rdf4j` and `unifiedviews` Services live.
*/}}
apiVersion: batch/v1
kind: Job
metadata:
  name: uv-password-reset
  labels: {{- include "uv.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "15"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "uv.labels" . | nindent 8 }}
        app.kubernetes.io/name: uv-password-reset
        app.kubernetes.io/component: uv-password-reset
    spec:
      restartPolicy: OnFailure
      containers:
        - name: reset
          image: alpine:3.20
          imagePullPolicy: IfNotPresent
          env:
            - name: RDF4J_URL
              value: {{ .Values.passwordReset.rdf4jUrl | quote }}
            - name: REPO
              value: {{ .Values.passwordReset.repository | quote }}
            - name: CONF_GRAPH
              value: {{ .Values.passwordReset.confGraph | quote }}
            - name: USER_BASE
              value: {{ .Values.passwordReset.userBase | quote }}
            - name: PASSWORD_PRED
              value: {{ .Values.passwordReset.passwordPredicate | quote }}
          command:
            - /bin/sh
            - -ec
            - |
              apk add --no-cache bash curl python3 >/dev/null
              exec /bin/bash <<'RESET_EOF'
              set -euo pipefail

              STMTS="$RDF4J_URL/repositories/$REPO/statements"

              # 1. Wait for the rdf4j Service.
              echo "Waiting for RDF4J at $RDF4J_URL/protocol ..."
              for i in $(seq 1 60); do
                  if curl -sf -o /dev/null "$RDF4J_URL/protocol"; then
                      echo "  rdf4j up after $i attempt(s)"
                      break
                  fi
                  [ "$i" = "60" ] && { echo "ERROR: rdf4j never came up (5min)" >&2; exit 1; }
                  sleep 5
              done

              # 2. Wait for the uv repository (UV creates it on first
              # boot via its own bootstrap).
              echo "Waiting for repository '$REPO' ..."
              for i in $(seq 1 120); do
                  code=$(curl -s -o /dev/null -w '%{http_code}' \
                      "$RDF4J_URL/repositories/$REPO/size")
                  if [ "$code" = "200" ]; then
                      echo "  repo '$REPO' present after $i attempt(s)"
                      break
                  fi
                  [ "$i" = "120" ] && { echo "ERROR: repo '$REPO' never appeared (10min)" >&2; exit 1; }
                  sleep 5
              done

              reset_password() {
                  local username="$1"
                  # Password is passed via PW env var (not positional)
                  # so it never lands on a shell command line where
                  # special chars could break the parse.
                  local user_uri="${USER_BASE}${username}"
                  echo "Resetting password for <$user_uri> ..."

                  # 3. Wait for UV to have seeded this user's triples
                  # (so we don't orphan a password without role/email).
                  for i in $(seq 1 120); do
                      ASK=$(curl -s -G "$RDF4J_URL/repositories/$REPO" \
                          --data-urlencode "query=ASK { GRAPH <$CONF_GRAPH> { <$user_uri> <$PASSWORD_PRED> ?p } }" \
                          -H 'Accept: application/sparql-results+json' \
                          | python3 -c 'import sys,json; print(json.load(sys.stdin).get("boolean", False))')
                      if [ "$ASK" = "True" ]; then
                          echo "  user '$username' present after $i attempt(s)"
                          break
                      fi
                      if [ "$i" = "120" ]; then
                          echo "ERROR: user '$username' never appeared in conf graph -- UV bootstrap may have failed" >&2
                          exit 1
                      fi
                      sleep 5
                  done

                  # 4. Generate fresh PBKDF2-HMAC-SHA1 hash. Password
                  # comes from $PW env var so any chars (incl. quotes,
                  # backslashes, $) round-trip safely.
                  HASH=$(python3 -c 'import hashlib,os,secrets; salt=secrets.token_bytes(32); dk=hashlib.pbkdf2_hmac("sha1", os.environ["PW"].encode(), salt, 100000, 32); print("100000:" + salt.hex() + ":" + dk.hex())')
                  echo "  new hash: $HASH"

                  # 5. DELETE old + INSERT new, both scoped to conf graph.
                  UPDATE="DELETE { GRAPH <$CONF_GRAPH> { <$user_uri> <$PASSWORD_PRED> ?old } } WHERE { GRAPH <$CONF_GRAPH> { <$user_uri> <$PASSWORD_PRED> ?old } }; INSERT DATA { GRAPH <$CONF_GRAPH> { <$user_uri> <$PASSWORD_PRED> \"$HASH\" } }"

                  http_code=$(curl -s -o /tmp/resp -w '%{http_code}' \
                      -X POST --data-urlencode "update=$UPDATE" "$STMTS")
                  if [ "$http_code" = "204" ] || [ "$http_code" = "200" ]; then
                      echo "  PUT update -> HTTP $http_code (ok)"
                  else
                      echo "ERROR: SPARQL UPDATE returned HTTP $http_code:" >&2
                      cat /tmp/resp >&2
                      exit 1
                  fi
              }

              {{- range .Values.passwordReset.users }}
              PW={{ .password | quote }} reset_password {{ .username | quote }}
              {{- end }}

              echo "Done. UV passwords reset."
              RESET_EOF
{{- end }}
