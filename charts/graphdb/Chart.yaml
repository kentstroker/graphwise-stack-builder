apiVersion: v2
name: graphdb
description: |
  Ontotext GraphDB triple store. Installed twice as subchart aliases of
  the `graphwise-stack` umbrella (see charts/graphwise-stack/Chart.yaml):

    - graphdb-embedded -> backs PoolParty (thesaurus storage, project
      registry). In-cluster Service is `graphwise-stack-graphdb-embedded:7200`
      (rendered from the <release>-<alias> fullname pattern in
      templates/_helpers.tpl).
    - graphdb-projects -> standalone workbench for user RDF data.
      In-cluster Service is `graphwise-stack-graphdb-projects:7200`.

  Both instances pull the same image and reference the same license
  Secret (graphdb-license). They get separate PVCs, separate Services,
  and separate Ingresses (different public hostnames). Standalone
  install (`helm install graphdb ./charts/graphdb ...`) still works
  and renders resources as `<release>-graphdb`.

  Ingress is HTTPS-only via cert-manager + Let's Encrypt, gated by
  HTTP basic auth (matches the existing demo's demo:rdf#rocks pattern).
type: application
version: 2.2.4
appVersion: "11.4.2"
maintainers:
  - name: gsb
    url: https://github.com/kentstroker/graphwise-stack-builder
keywords:
  - graphdb
  - rdf
  - sparql
  - graphwise
