{{- if .Values.basicAuth.enabled }}
{{/*
nginx-ingress's basic-auth annotations expect a Secret with one key
named `auth` whose value is htpasswd-format. We create it here from
.Values.basicAuth.htpasswd so the chart is self-contained — no
out-of-band kubectl create secret needed.

Default credentials match today's demo: demo / rdf#rocks.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "graphdb.fullname" . }}-basic-auth
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "graphdb.labels" . | nindent 4 }}
type: Opaque
stringData:
  auth: |
    {{ .Values.basicAuth.htpasswd }}
{{- end }}
