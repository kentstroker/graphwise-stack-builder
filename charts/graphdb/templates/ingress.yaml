{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "graphdb.fullname" . }}
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "graphdb.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.basicAuth.enabled }}
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: {{ include "graphdb.fullname" . }}-basic-auth
    nginx.ingress.kubernetes.io/auth-realm: "GraphDB ({{ include "graphdb.fullname" . }})"
    {{- end }}
    {{- if .Values.allowedCidrs }}
    nginx.ingress.kubernetes.io/whitelist-source-range: {{ join "," .Values.allowedCidrs | quote }}
    {{- end }}
    nginx.ingress.kubernetes.io/proxy-body-size: 100m
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        - {{ include "graphdb.ingressHost" . | quote }}
      secretName: wildcard-tls
  rules:
    - host: {{ include "graphdb.ingressHost" . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "graphdb.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
