apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "graphdb.fullname" . }}
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "graphdb.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "graphdb.fullname" . }}
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "graphdb.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "graphdb.labels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: graphdb
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # The image's __cacert_entrypoint.sh installs system CA certs
          # before launching GraphDB. Mirrors today's base.yaml.
          command: ["/__cacert_entrypoint.sh"]
          args: ["/opt/graphdb/dist/bin/graphdb"]
          env:
            - name: USE_SYSTEM_CA_CERTS
              value: "yes"
            - name: graphdb__home
              value: /opt/graphdb/home
            - name: graphdb__license__file
              value: /etc/graphdb/graphdb.license
            - name: graphdb__external___url
              value: {{ required "externalUrl must be set" .Values.externalUrl | quote }}
            {{- with .Values.javaOpts }}
            - name: GDB_JAVA_OPTS
              value: {{ . | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: 7200
              protocol: TCP
          # /protocol returns the SPARQL protocol version when the
          # server is up. Same probe as today's compose healthcheck.
          readinessProbe:
            httpGet:
              path: /protocol
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /protocol
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /opt/graphdb/home
            - name: license
              mountPath: /etc/graphdb/graphdb.license
              subPath: {{ .Values.license.secretKey }}
              readOnly: true
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: license
          secret:
            secretName: {{ .Values.license.secretName }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [{{ .Values.persistence.accessMode | quote }}]
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
