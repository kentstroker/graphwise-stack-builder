{{- if .Values.federatedMysql.enabled }}
{{/*
Standalone MySQL for the federated GraphDB demo. No MySQL operator in
this repo, so a plain StatefulSet with a PVC. Official mysql image is
multi-arch (arm64/Graviton). Empty on first boot; in-cluster access
only — no Ingress. Clients use federated-mysql.federated:3306.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.federatedMysql.name }}-creds
  namespace: {{ .Values.federatedMysql.namespace }}
  labels:
    {{- include "graphwise-stack.labels" . | nindent 4 }}
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: {{ .Values.federatedMysql.rootPassword | quote }}
  MYSQL_DATABASE: {{ .Values.federatedMysql.database | quote }}
  MYSQL_USER: {{ .Values.federatedMysql.appUsername | quote }}
  MYSQL_PASSWORD: {{ .Values.federatedMysql.appPassword | quote }}
---
# Headless Service for stable StatefulSet pod DNS.
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.federatedMysql.name }}-headless
  namespace: {{ .Values.federatedMysql.namespace }}
  labels:
    {{- include "graphwise-stack.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: {{ .Values.federatedMysql.name }}
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
---
# Client-facing ClusterIP Service.
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.federatedMysql.name }}
  namespace: {{ .Values.federatedMysql.namespace }}
  labels:
    {{- include "graphwise-stack.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ .Values.federatedMysql.name }}
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.federatedMysql.name }}
  namespace: {{ .Values.federatedMysql.namespace }}
  labels:
    {{- include "graphwise-stack.labels" . | nindent 4 }}
spec:
  serviceName: {{ .Values.federatedMysql.name }}-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.federatedMysql.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.federatedMysql.name }}
    spec:
      containers:
        - name: mysql
          image: {{ .Values.federatedMysql.image | quote }}
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: {{ .Values.federatedMysql.name }}-creds
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "127.0.0.1"]
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "127.0.0.1"]
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.federatedMysql.storage }}
{{- end }}
