{{- with index .Values "graphrag-secrets" }}
{{- if .enabled }}
{{/*
Secrets and ConfigMap consumed by the vendored graphrag chart.
Mirror what graphrag-charts-main/scripts/dev.sh creates manually,
but as Helm-managed resources so they get versioned and re-applied
together with the rest of the stack.
*/}}
---
apiVersion: v1
kind: Secret
metadata:
  name: graphrag-conversation-database-credentials
  namespace: {{ .namespace }}
type: Opaque
stringData:
  spring.datasource.username: {{ .conversation.dbUsername | quote }}
  spring.datasource.password: {{ .conversation.dbPassword | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: graphrag-conversation-keycloak-client
  namespace: {{ .namespace }}
type: Opaque
stringData:
  spring.security.oauth2.client.registration.keycloak.client-id: {{ .conversationKeycloak.clientId | quote }}
  spring.security.oauth2.client.registration.keycloak.client-secret: {{ .conversationKeycloak.clientSecret | quote }}
  spring.security.oauth2.client.registration.keycloak.scope: {{ .conversationKeycloak.scope | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: graphrag-components-vector-database
  namespace: {{ .namespace }}
data:
  VECTOR_STORE: {{ .vectorDB.vectorStore | quote }}
  ELASTIC_URL: {{ .vectorDB.elasticUrl | quote }}
  VECTOR_INDEX: {{ .vectorDB.vectorIndex | quote }}
  VECTOR_FIELD_NAME: {{ .vectorDB.vectorFieldName | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: graphrag-components-aws-credentials
  namespace: {{ .namespace }}
type: Opaque
stringData:
  AWS_REGION: {{ .awsCredentials.region | quote }}
  AWS_ACCESS_KEY_ID: {{ .awsCredentials.accessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .awsCredentials.secretAccessKey | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: graphrag-n8n-database-credentials
  namespace: {{ .namespace }}
type: Opaque
stringData:
  DB_POSTGRESDB_USER: {{ .n8nDatabase.username | quote }}
  DB_POSTGRESDB_PASSWORD: {{ .n8nDatabase.password | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: graphrag-n8n-encryption
  namespace: {{ .namespace }}
type: Opaque
stringData:
  N8N_ENCRYPTION_KEY: {{ .n8nEncryption.key | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: graphrag-n8n-license
  namespace: {{ .namespace }}
type: Opaque
stringData:
  N8N_LICENSE_ACTIVATION_KEY: {{ .n8nLicense.activationKey | quote }}
{{- end }}
{{- end }}
