{{- if .Values.keycloak.enabled }}
{{/*
Keycloak instance, managed by the operator. Single replica for demo
(operator default of 2 doubles RAM cost).

hostname.hostname is the public Keycloak URL — used by the operator
to set Keycloak's own KC_HOSTNAME, which MUST exactly match the
issuer claim in JWTs (CLAUDE.md "Keycloak hostname rule"). Per Q5
(subdomains), Keycloak lives on auth.<sub>.<base> with NO context
path, so issuer URLs come out as https://auth.<sub>.<base>/realms/X.

Both PoolParty and graphrag-conversation must point at this same URL
or their JwtDecoder beans will fail with "issuer did not match".
*/}}
apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: {{ .Values.keycloak.name }}
  namespace: {{ .Values.keycloak.namespace }}
  labels:
    {{- include "graphwise-stack.labels" . | nindent 4 }}
spec:
  instances: {{ .Values.keycloak.instances }}
  {{- if .Values.keycloak.image }}
  # Custom Keycloak runtime image (default: ontotext/poolparty-keycloak,
  # which bundles PoolParty's poolparty-default-settings-provider SPI +
  # poolparty login theme into a Keycloak 25.0.6 distribution). Without
  # this, post-deploy user creation 500s in PoolParty with "skosView is
  # missing" because the SPI that bridges Keycloak user-creation events
  # to PoolParty's per-user settings DB isn't on the classpath.
  #
  # startOptimized=false is required for any custom-provider image:
  # the operator's default `kc.sh start --optimized` path assumes the
  # image was built with `kc.sh build` covering its current arg set.
  # Setting it false runs the auto-build step at pod startup so the
  # vendored providers actually register.
  image: {{ .Values.keycloak.image | quote }}
  startOptimized: false
  {{- end }}
  db:
    vendor: postgres
    host: {{ .Values.keycloak.postgres.name }}-rw
    database: keycloak
    usernameSecret:
      name: keycloak-postgres-user
      key: username
    passwordSecret:
      name: keycloak-postgres-user
      key: password
  ingress:
    # Operator-managed Ingress is HTTP-only when http.httpEnabled=true,
    # and the operator gives us no way to inject a `tls:` block via the
    # CR (true for every operator version we've tested through 25.0.6 /
    # 26.4.x). Without `tls:`, cert-manager's ingress-shim never
    # mints a cert and every https://auth.<apex> request fails the
    # handshake. We ship our own Ingress in keycloak-ingress.yaml with
    # the TLS block + cert-manager annotation, matching every other
    # app in this stack.
    enabled: false
  http:
    httpEnabled: true
  hostname:
    hostname: {{ include "graphwise-stack.authHost" . | quote }}
    strict: true
  proxy:
    headers: xforwarded
{{- end }}
