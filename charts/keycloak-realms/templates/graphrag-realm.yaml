{{- if .Values.graphrag.enabled }}
{{/*
GraphRAG realm — imported inline. Mirrors the structure of
graphrag-charts-main/examples/dev/keycloak-realm-import.yaml but with
hostnames templated from values.

Two clients:
- chatbot-app-client    : public, used by the chatbot SPA
- conversation-api-client : confidential, used by the chatbot's
                            backend (graphrag-conversation) for
                            inter-service auth

Subdomain/baseDomain resolution:
  Reads `.Values.subdomain` and `.Values.baseDomain` directly. The
  umbrella graphwise-stack chart sets these explicitly via
  scripts/render-values.sh's overlay (a `keycloak-realms:` block
  with subdomain + baseDomain) -- we don't depend on Helm's global
  propagation (.Values.global.*) because in our chart structure
  globals don't reliably reach this subchart's render context.
  Without these values being set, redirectUris would render as
  `https://graphrag../*` and the chatbot login fails with
  "Invalid parameter: redirect_url".
*/}}
{{- $sub  := required "keycloak-realms.subdomain must be set (umbrella's render-values.sh sets this)"  .Values.subdomain  -}}
{{- $base := required "keycloak-realms.baseDomain must be set (umbrella's render-values.sh sets this)" .Values.baseDomain -}}
apiVersion: k8s.keycloak.org/v2alpha1
kind: KeycloakRealmImport
metadata:
  name: {{ .Values.graphrag.realm }}-realm
  # Pin to the namespace the Keycloak operator watches (see comment
  # in poolparty-realm.yaml).
  namespace: {{ .Values.keycloakNamespace | default "keycloak" }}
  labels:
    {{- include "keycloak-realms.labels" . | nindent 4 }}
spec:
  keycloakCRName: {{ .Values.keycloakCRName }}
  realm:
    id: {{ .Values.graphrag.realm | quote }}
    realm: {{ .Values.graphrag.realm | quote }}
    enabled: true
    registrationAllowed: false
    resetPasswordAllowed: false
    loginWithEmailAllowed: true
    duplicateEmailsAllowed: false
    users:
      {{- range .Values.graphrag.users }}
      - username: {{ .username | quote }}
        enabled: true
        emailVerified: true
        firstName: {{ .firstName | quote }}
        lastName: {{ .lastName | quote }}
        email: {{ .email | quote }}
        credentials:
          - type: password
            value: {{ .password | quote }}
            temporary: false
      {{- end }}
    clients:
      - clientId: chatbot-app-client
        secret: null
        enabled: true
        protocol: openid-connect
        publicClient: true
        redirectUris:
          - https://graphrag.{{ $sub }}.{{ $base }}/*
          - https://graphrag.{{ $sub }}.{{ $base }}/
        webOrigins:
          - https://graphrag.{{ $sub }}.{{ $base }}
        standardFlowEnabled: true
        directAccessGrantsEnabled: true
      - clientId: conversation-api-client
        secret: {{ .Values.graphragConversationClientSecret | quote }}
        enabled: true
        protocol: openid-connect
        publicClient: false
        redirectUris: []
        webOrigins:
          - https://graphrag.{{ $sub }}.{{ $base }}
        standardFlowEnabled: true
        directAccessGrantsEnabled: true
{{- end }}
