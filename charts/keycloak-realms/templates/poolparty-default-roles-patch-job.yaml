{{- if .Values.poolparty.enabled }}
{{/*
Helm post-install/post-upgrade hook that composes a default user role
into `default-roles-poolparty` so every newly-created Keycloak user
in the poolparty realm automatically has login authorization for the
`ppt` client.

Why this exists:
  10.3 "role isolation" (poolparty-keycloak:2.5.0) moved the PoolParty
  authorization roles from REALM roles to per-CLIENT roles (ppt/ppgs/
  extractor each define PoolPartyUser/Admin/ReadOnly/SuperAdmin), and the
  realm's `default-roles-poolparty` composite now ships EMPTY. Users
  created directly in Keycloak (admin UI, kcadm, PoolParty's own admin UI
  which proxies the Keycloak admin REST API) therefore inherit no
  PoolParty-authorizing role -- they authenticate fine but hit
  `403 access_denied / not_authorized` from PoolParty's UMA layer.
  (Pre-10.3 realms shipped a single `PoolPartyUser` REALM role; the
  vendor's expected flow was LDAP-driven via a default-role SPI mapper.)

  This Job composes the realm role `local-user` plus the client role
  `PoolPartyUser` on each of ppt/ppgs/extractor into
  `default-roles-poolparty` (the realm default role auto-assigned to
  every new user), mirroring how the chart-seeded `superadmin` is
  authorized. POST is idempotent: re-adding a member no-ops with 204.

Auth flow (mirrors graphrag-realm-patch-job.yaml):
  1. Wait for /realms/poolparty/.well-known/openid-configuration so we
     know the realm import (async, operator-driven) has completed.
  2. Get a temp-admin token from master.
  3. Wire poolparty-realm client roles into master's admin composite
     (same pattern bootstrap-admin uses for the global realm list --
     safe to re-run, no-ops on already-wired roles). Without this the
     temp-admin token doesn't carry manage-realm rights on poolparty.
  4. Refresh the token so the new roles appear in the JWT.
  5. Resolve local-user (realm role) + PoolPartyUser on each of
     ppt/ppgs/extractor (client roles) and POST them as one array to
     the default-roles-poolparty composite.

Hook semantics:
  - post-install,post-upgrade: runs on every install + upgrade.
  - hook-weight: 8 (after bootstrap-admin at 5).
  - hook-delete-policy: before-hook-creation,hook-succeeded.

Lives in the keycloak namespace because Keycloak runs there.
*/}}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: poolparty-default-roles-patch
  namespace: {{ .Values.keycloakNamespace | default "keycloak" }}
  labels:
    {{- include "keycloak-realms.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "8"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "keycloak-realms.labels" . | nindent 8 }}
        app.kubernetes.io/name: poolparty-default-roles-patch
        app.kubernetes.io/component: poolparty-default-roles-patch
    spec:
      restartPolicy: OnFailure
      containers:
        - name: patch
          image: alpine:3.20
          imagePullPolicy: IfNotPresent
          env:
            - name: KC_SERVER
              value: "http://{{ .Values.keycloakCRName }}-service.{{ .Values.keycloakNamespace | default "keycloak" }}:8080"
            - name: TEMP_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloakCRName }}-initial-admin
                  key: username
            - name: TEMP_ADMIN_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloakCRName }}-initial-admin
                  key: password
            - name: REALM
              value: "poolparty"
            - name: DEFAULT_COMPOSITE
              value: "default-roles-poolparty"
            - name: COMPOSE_ROLE
              value: {{ .Values.poolparty.defaultUserRole | default "PoolPartyUser" | quote }}
            - name: REALM_ROLE
              value: {{ .Values.poolparty.defaultUserRealmRole | default "local-user" | quote }}
            - name: CLIENT_IDS
              value: {{ .Values.poolparty.defaultUserClients | default (list "ppt" "ppgs" "extractor") | join " " | quote }}
          command:
            - /bin/sh
            - -ec
            - |
              apk add --no-cache bash curl jq >/dev/null
              exec /bin/bash <<'PATCH_EOF'
              set -euo pipefail

              get_token() {
                  curl -sf \
                      --data-urlencode "client_id=admin-cli" \
                      --data-urlencode "grant_type=password" \
                      --data-urlencode "username=$TEMP_ADMIN_USER" \
                      --data-urlencode "password=$TEMP_ADMIN_PASS" \
                      "$KC_SERVER/realms/master/protocol/openid-connect/token" \
                      | jq -r .access_token
              }

              # 1. Wait for poolparty realm to exist (operator may still
              # be importing it on first install).
              echo "Waiting for $REALM realm at $KC_SERVER/realms/$REALM ..."
              for i in $(seq 1 60); do
                  if curl -sf -o /dev/null \
                      "$KC_SERVER/realms/$REALM/.well-known/openid-configuration"; then
                      echo "  realm '$REALM' present after $i attempt(s)"
                      break
                  fi
                  [ "$i" = "60" ] && { echo "ERROR: realm '$REALM' never appeared (5min)" >&2; exit 1; }
                  sleep 5
              done

              # 2. Auth as temp-admin (master).
              TOKEN=$(get_token)
              [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ] && { echo "ERROR: temp-admin auth failed" >&2; exit 1; }

              # 3. Wire poolparty-realm client roles into master's admin
              # composite so the temp-admin token carries manage-realm
              # rights on poolparty. Idempotent.
              echo "Wiring $REALM-realm client roles into master admin composite..."
              REALM_CLIENT_ID=$(curl -sf -H "Authorization: Bearer $TOKEN" \
                  "$KC_SERVER/admin/realms/master/clients?clientId=$REALM-realm" \
                  | jq -r '.[0].id // empty')
              if [ -z "$REALM_CLIENT_ID" ]; then
                  echo "ERROR: $REALM-realm client doesn't exist in master (realm import failed?)" >&2
                  exit 1
              fi
              ROLES=$(curl -sf -H "Authorization: Bearer $TOKEN" \
                  "$KC_SERVER/admin/realms/master/clients/$REALM_CLIENT_ID/roles")
              COUNT=$(echo "$ROLES" | jq 'length')
              curl -s -o /dev/null -w "  composite POST -> HTTP %{http_code} (${COUNT} roles wired)\n" \
                  -X POST -H "Authorization: Bearer $TOKEN" -H 'Content-Type: application/json' \
                  "$KC_SERVER/admin/realms/master/roles/admin/composites" \
                  -d "$ROLES"

              # 4. Refresh the token so the new composite roles appear.
              TOKEN=$(get_token)

              # 5. Compose default authorization into the (empty) realm
              # default role. 10.3 "role isolation" moved PoolParty* from
              # realm roles to per-client roles (ppt/ppgs/extractor) and
              # ships `default-roles-poolparty` empty, so we compose:
              #   - the realm role $REALM_ROLE (local-user), plus
              #   - the client role $COMPOSE_ROLE (PoolPartyUser) on each
              #     client in $CLIENT_IDS
              # into $DEFAULT_COMPOSITE -- mirroring how the seeded
              # `superadmin` is authorized. We build ONE JSON array of role
              # representations and POST it (composite reps need the client
              # UUID as containerId, so a client role can't be added by name
              # alone). POST is idempotent: re-adding an existing member is a
              # 204 no-op. Response code IS checked -- curl exits 0 on an
              # HTTP error, so an unchecked POST would let Helm see a false
              # success.
              echo "Composing default authorization into '$DEFAULT_COMPOSITE' (realm '$REALM')..."
              REPS='[]'

              # realm role (local-user)
              RR=$(curl -sf -H "Authorization: Bearer $TOKEN" \
                  "$KC_SERVER/admin/realms/$REALM/roles/$REALM_ROLE" || true)
              if [ -n "$RR" ] && [ "$(echo "$RR" | jq -r .name)" = "$REALM_ROLE" ]; then
                  REPS=$(echo "$REPS" | jq --argjson r "$RR" '. + [$r]')
                  echo "  + realm role '$REALM_ROLE'"
              else
                  echo "  WARN: realm role '$REALM_ROLE' not found -- skipping" >&2
              fi

              # client role (PoolPartyUser) on each configured client
              for CID in $CLIENT_IDS; do
                  CUUID=$(curl -sf -H "Authorization: Bearer $TOKEN" \
                      "$KC_SERVER/admin/realms/$REALM/clients?clientId=$CID" \
                      | jq -r '.[0].id // empty')
                  if [ -z "$CUUID" ]; then
                      echo "  WARN: client '$CID' not found -- skipping" >&2
                      continue
                  fi
                  CR=$(curl -sf -H "Authorization: Bearer $TOKEN" \
                      "$KC_SERVER/admin/realms/$REALM/clients/$CUUID/roles/$COMPOSE_ROLE" || true)
                  if [ -n "$CR" ] && [ "$(echo "$CR" | jq -r .name)" = "$COMPOSE_ROLE" ]; then
                      REPS=$(echo "$REPS" | jq --argjson r "$CR" '. + [$r]')
                      echo "  + client role '$CID:$COMPOSE_ROLE'"
                  else
                      echo "  WARN: client role '$CID:$COMPOSE_ROLE' not found -- skipping" >&2
                  fi
              done

              N=$(echo "$REPS" | jq 'length')
              if [ "$N" = "0" ]; then
                  echo "ERROR: no roles resolved to compose into '$DEFAULT_COMPOSITE' -- realm import incomplete, or the vendor role model changed again? Inspect the realm's roles + clients." >&2
                  exit 1
              fi

              echo "$REPS" > /tmp/compose.json
              HTTP=$(curl -s -o /tmp/compose.resp -w '%{http_code}' \
                  -X POST -H "Authorization: Bearer $TOKEN" -H 'Content-Type: application/json' \
                  "$KC_SERVER/admin/realms/$REALM/roles/$DEFAULT_COMPOSITE/composites" \
                  --data-binary @/tmp/compose.json)
              echo "  compose POST ($N role(s)) -> HTTP $HTTP"
              if [ "$HTTP" != "204" ] && [ "$HTTP" != "201" ]; then
                  echo "ERROR: composite POST failed. Response body:" >&2
                  cat /tmp/compose.resp >&2
                  echo >&2
                  exit 1
              fi

              # 6. Verify the composite now actually contains the client
              # role (defense-in-depth against a silently-swallowed POST).
              if ! curl -sf -H "Authorization: Bearer $TOKEN" \
                      "$KC_SERVER/admin/realms/$REALM/roles/$DEFAULT_COMPOSITE/composites" \
                      | jq -e --arg n "$COMPOSE_ROLE" 'map(.name) | index($n)' >/dev/null; then
                  echo "ERROR: '$COMPOSE_ROLE' is not in '$DEFAULT_COMPOSITE' after POST -- the composite-add didn't take." >&2
                  exit 1
              fi

              echo "Done. New users in '$REALM' inherit '$REALM_ROLE' + '$COMPOSE_ROLE' (on: $CLIENT_IDS) via '$DEFAULT_COMPOSITE'."
              PATCH_EOF
{{- end }}
