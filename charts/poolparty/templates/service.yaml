apiVersion: v1
kind: Service
metadata:
  name: {{ include "poolparty.fullname" . }}
  labels:
    {{- include "poolparty.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "poolparty.selectorLabels" . | nindent 4 }}
