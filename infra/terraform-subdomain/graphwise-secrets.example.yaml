# graphwise-secrets.example.yaml -- template for the laptop kit.
#
# Copy to graphwise-secrets.yaml, fill in the FILL IN lines, and push with
# scripts/push-initial.sh (first build) or scripts/push-config.sh (rebuilds).
# The filled-in file is a DEPLOYMENT SECRET -- it is gitignored; never commit it.
#
# This is the SAME structure cloud-init seeds at ~/graphwise-secrets.yaml on the
# EC2. On a new stack you edit THIS local copy and push it -- do not edit the
# EC2 copy (push-initial overwrites it).

maven:
  user: ""                  # FILL IN: Graphwise maven user
  pass: ""                  # FILL IN: Graphwise maven password

graphrag-secrets:
  awsCredentials:           # Bedrock IAM user (graphrag-bedrock) -- SETUP step 4b
    region: "us-west-2"
    accessKeyId: ""         # FILL IN: AKIA...
    secretAccessKey: ""     # FILL IN
  n8nLicense:
    activationKey: ""       # FILL IN: n8n Enterprise key
  n8nEncryption:
    # LEAVE BLANK on a new stack: push-initial keeps the key Terraform
    # generated on the EC2. Only set a value here if you are restoring an n8n
    # DB mirror encrypted with a specific constant key (advanced/WIP -- see
    # n8n-workflows/README.md and docs/claude/MIRROR-N8N.md).
    key: ""
