# Single-node KIND cluster configuration for the Graphwise stack.
#
# Why one node, not the upstream graphrag-charts-main 4-node example?
#   - This is a single-EC2 demo. Multi-node KIND on one host costs
#     ~1.5 GB per worker container with no resilience benefit, and
#     our Helm charts deploy single replicas anyway (see Q9 in the
#     architecture decisions: "minimal demo-grade charts").
#   - extraPortMappings work the same way: KIND maps host 80/443 to
#     the control-plane node, ingress-nginx runs there.
#
# Why no digest pin on kindest/node?
#   - kindest/node is multi-arch but the digest published by upstream
#     is the manifest list digest. Pinning works on both archs in
#     theory; we drop it here so a re-image to a fresher v1.33.x
#     patch doesn't require touching this file.
#
# Why apiServerAddress=127.0.0.1?
#   - The cluster API is for in-host use only; never exposed publicly.
#     SSH-tunnel to it if you need kubectl from your laptop.
#
# Ref: https://kind.sigs.k8s.io/docs/user/configuration/
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    image: kindest/node:v1.36.1
    # ingress-nginx in KIND looks for nodes labelled ingress-ready=true
    # to schedule its controller. With one node this is trivially the
    # control-plane.
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
      # Bind kube-controller-manager / kube-scheduler / etcd metrics
      # endpoints to 0.0.0.0 (KIND defaults them to 127.0.0.1, which
      # makes them unreachable from the prometheus pod's network
      # namespace -- the kube-prometheus-stack ServiceMonitors then
      # show 0/1 up for these targets).
      - |
        kind: ClusterConfiguration
        controllerManager:
          extraArgs:
            bind-address: "0.0.0.0"
        scheduler:
          extraArgs:
            bind-address: "0.0.0.0"
        etcd:
          local:
            extraArgs:
              listen-metrics-urls: "http://0.0.0.0:2381"
      # Same for kube-proxy's metrics server (defaults to 127.0.0.1:10249).
      - |
        kind: KubeProxyConfiguration
        metricsBindAddress: "0.0.0.0"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      # Elasticsearch direct. Public access on host :19200 forwards to
      # KIND node :31920, which the poolparty-elasticsearch NodePort
      # Service listens on. Gated by aws_security_group_rule
      # "elasticsearch" in infra/terraform-<stack>/main.tf.
      - containerPort: 31920
        hostPort: 19200
        protocol: TCP
        listenAddress: "0.0.0.0"
    # Mount the EC2's standardized ingest landing pad into the KIND
    # control-plane container so it can be exposed to pods via a
    # hostPath PV. Cloud-init creates /home/ec2-user/staging-data on
    # first EC2 boot (see infra/terraform-<stack>/user-data.sh.tpl); the
    # umbrella chart's templates/staging-data.yaml renders per-namespace
    # PV/PVC pairs against the containerPath below. See HOWITWORKS §11
    # for the three-layer wiring explanation.
    extraMounts:
      - hostPath: /home/ec2-user/staging-data
        containerPath: /staging-data
networking:
  apiServerAddress: "127.0.0.1"
  apiServerPort: 6443
